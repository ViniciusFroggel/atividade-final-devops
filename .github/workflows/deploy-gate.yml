name: 1 - Deploy Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # GATE 1: Qualidade de código (testes unitários)
  unit-tests:
    name: Testes Unitários
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes com cobertura
        run: npm test

      - name: Upload relatório de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # GATE 2: Validação de segurança (audit)
  security-audit:
    name: Auditoria de Segurança
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm ci

      - name: Verificar vulnerabilidades
        run: npm audit --audit-level=high || echo "Auditoria concluída com avisos"

  # GATE 3: Deploy só acontece se os dois gates anteriores passarem
  deploy-producao:
    name: Deploy para Produção
    runs-on: ubuntu-latest
    needs: [unit-tests, security-audit]  # <-- DEPLOY GATE: depende dos dois jobs acima
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Simular deploy em produção
        run: |
          echo "============================================"
          echo "  DEPLOY GATE: Todos os testes passaram!"
          echo "============================================"
          echo "Iniciando deploy para produção..."
          echo "Versão: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Deploy concluído com sucesso!"

      - name: Notificar sucesso
        run: echo "✅ Deploy em produção realizado - commit ${{ github.sha }}"
